<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" role="img" aria-label="">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5f5f5"/>
      <stop offset="1" stop-color="#e9e9e9"/>
    </linearGradient>
    <filter id="noise" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.45  0 0 0 0 0.45  0 0 0 0 0.45  0 0 0 0.18 0"/>
    </filter>
    <pattern id="grain" width="220" height="220" patternUnits="userSpaceOnUse">
      <rect width="220" height="220" fill="url(#g)"/>
      <rect width="220" height="220" filter="url(#noise)" opacity="0.55"/>
    </pattern>
  </defs>
  <rect width="1600" height="1200" fill="url(#grain)"/>
</svg>
